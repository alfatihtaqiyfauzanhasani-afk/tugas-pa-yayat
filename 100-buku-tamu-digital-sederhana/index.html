<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buku tamu digital sederhana</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bungkus">
    <h1>Buku tamu digital sederhana</h1>
    <p class="keterangan">Tamu bisa menulis nama dan pesan.</p>

    <button id="tambah">Kirim</button>
    <button id="hapus">Hapus semua</button>
    <ul id="daftar"></ul>
  </div>
  <script src="code.js"></script>
</body>
</html>
