<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bungkus">
    <h1>Tic Tac Toe</h1>
    <p class="keterangan">Main X dan O bergantian.</p>
    <div id="papan" class="grid" style="grid-template-columns:repeat(3,1fr)"></div>
    <button id="ulang">Ulang</button>
    <div id="hasil" class="hasil">Giliran X</div>
  </div>
  <script src="code.js"></script>
</body>
</html>
